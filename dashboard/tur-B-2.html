<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VALEO Enerji Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f0f2f5;color:#1a1a2e;font-size:14px}
.header{background:#1a1a2e;color:#fff;padding:12px 24px;display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:18px;font-weight:600}
.header .meta{font-size:12px;opacity:.8}
.filters{background:#fff;padding:10px 24px;display:flex;gap:12px;align-items:center;border-bottom:1px solid #ddd;flex-wrap:wrap}
.filters label{font-size:12px;font-weight:600;color:#555}
.filters select{padding:4px 8px;border:1px solid #ccc;border-radius:4px;font-size:13px}
.main{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:auto 1fr auto;gap:12px;padding:16px 24px;height:calc(100vh - 100px);overflow:hidden}
.card{background:#fff;border-radius:8px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.e1{grid-column:1/-1;display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
.kpi{background:#fff;border-radius:8px;padding:14px 16px;box-shadow:0 1px 3px rgba(0,0,0,.08);text-align:center}
.kpi .label{font-size:11px;color:#666;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.kpi .value{font-size:22px;font-weight:700;color:#1a1a2e}
.kpi .sub{font-size:11px;margin-top:4px;font-weight:600}
.kpi .icon{font-size:16px;margin-bottom:4px}
.up{color:#d32f2f}.down{color:#2e7d32}.neutral{color:#1565c0}
.badge{display:inline-block;padding:2px 6px;border-radius:10px;font-size:10px;font-weight:700;margin-top:2px}
.badge-red{background:#fdecea;color:#d32f2f}
.badge-green{background:#e8f5e9;color:#2e7d32}
.badge-blue{background:#e3f2fd;color:#1565c0}
.e2{min-height:0}
.e3{min-height:0}
.e4{grid-column:1/-1;overflow:auto;max-height:220px}
.section-title{font-size:13px;font-weight:700;margin-bottom:8px;color:#1a1a2e;display:flex;align-items:center;gap:6px}
.section-title span{font-size:14px}
.chart-wrap{position:relative;width:100%;height:calc(100% - 28px)}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#f5f5f5;padding:6px 8px;text-align:left;font-weight:600;position:sticky;top:0;border-bottom:2px solid #ddd}
td{padding:5px 8px;border-bottom:1px solid #eee}
tr:hover td{background:#f8f9ff}
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px}
.dot-red{background:#d32f2f}.dot-green{background:#2e7d32}.dot-yellow{background:#f9a825}
.state-overlay{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(255,255,255,.92);z-index:100}
.spinner{width:36px;height:36px;border:3px solid #e0e0e0;border-top-color:#1565c0;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.state-msg{margin-top:10px;font-size:14px;color:#666}
.error-msg{color:#d32f2f;font-weight:600}
@media(max-width:900px){
  .main{grid-template-columns:1fr;height:auto;overflow:auto}
  .e1{grid-template-columns:repeat(2,1fr)}
  .e4{max-height:300px}
}
</style>
</head>
<body>

<div class="state-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="state-msg">Veriler yükleniyor...</div>
</div>

<div class="header">
  <h1>VALEO Enerji Dashboard</h1>
  <div class="meta">Son Güncelleme: <span id="lastUpdate">--</span></div>
</div>

<div class="filters">
  <label>Hat:</label>
  <select id="filterHat"><option value="Tümü">Tümü</option></select>
  <label>Enerji Tipi:</label>
  <select id="filterEnerji"><option value="Tümü">Tümü</option></select>
  <label>Tarih Aralığı:</label>
  <select id="filterTarih">
    <option value="Tümü">Tümü</option>
    <option value="7">Son 7 Gün</option>
    <option value="14">Son 14 Gün</option>
  </select>
</div>

<div class="main">
  <div class="e1" id="kpiArea"></div>

  <div class="card e2">
    <div class="section-title"><span>E2</span> Günlük Birim Basina kWh Trendi</div>
    <div class="chart-wrap"><canvas id="trendChart"></canvas></div>
  </div>

  <div class="card e3">
    <div class="section-title"><span>E3</span> Hat Bazinda Tüketim Kirilimi</div>
    <div class="chart-wrap"><canvas id="paretoChart"></canvas></div>
  </div>

  <div class="card e4">
    <div class="section-title"><span>E4</span> Detay / Aksiyon Tablosu</div>
    <div style="overflow:auto;max-height:180px" id="tableWrap">
      <table>
        <thead><tr><th>Tarih</th><th>Hat</th><th>Enerji Tipi</th><th>Tüketim (kWh)</th><th>Üretim Adedi</th><th>kWh/Birim</th><th>Hedef</th><th>Sapma %</th><th>CO2 (kg)</th><th>Durum</th></tr></thead>
        <tbody id="detailBody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
const SHEET_ID = '1xB9uTcdJtLHyOrefS36OJU-HOGvdKEZ0U9FneN-5FwQ';
const SHEET_GID = '938135206';
const SHEET_URL = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/gviz/tq?tqx=out:csv&gid=' + SHEET_GID;

let rawData = [];
let trendChart = null, paretoChart = null;

function parseTR(s) {
  if (!s) return 0;
  return parseFloat(s.replace(/\./g, '').replace(',', '.'));
}

function formatTR(n, dec) {
  if (dec === undefined) dec = 2;
  const parts = n.toFixed(dec).split('.');
  parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, '.');
  return parts.join(',');
}

function formatDate(iso) {
  const p = iso.split('-');
  return p[2] + '.' + p[1] + '.' + p[0];
}

async function fetchData() {
  const res = await fetch(SHEET_URL);
  if (!res.ok) throw new Error('Veri kaynagina ulasilamadi (HTTP ' + res.status + ')');
  var rawText = await res.text();
  var text = rawText.trim();
  var lines = text.split('\n');
  if (lines.length < 2) throw new Error('Veri bulunamadi');

  var sep = lines[0].indexOf(';') >= 0 ? ';' : ',';

  function splitCSV(line) {
    var result = [], cur = '', inQuote = false;
    for (var c = 0; c < line.length; c++) {
      var ch = line[c];
      if (ch === '"') { inQuote = !inQuote; continue; }
      if (ch === sep && !inQuote) { result.push(cur.trim()); cur = ''; continue; }
      cur += ch;
    }
    result.push(cur.trim());
    return result;
  }

  rawData = [];
  var hatSet = new Set(), enerjiSet = new Set();

  for (var i = 1; i < lines.length; i++) {
    var cols = splitCSV(lines[i]);
    if (cols.length < 7) continue;
    var row = {
      tarih: cols[0],
      hat: cols[1],
      enerjiTipi: cols[2],
      tuketim: parseTR(cols[3]),
      uretim: parseTR(cols[4]),
      hedef: parseTR(cols[5]),
      co2Faktor: parseTR(cols[6])
    };
    row.birimKwh = row.uretim > 0 ? row.tuketim / row.uretim : 0;
    row.hedefSapma = row.hedef > 0 ? ((row.birimKwh - row.hedef) / row.hedef) * 100 : 0;
    row.co2 = row.tuketim * row.co2Faktor;
    rawData.push(row);
    hatSet.add(row.hat);
    enerjiSet.add(row.enerjiTipi);
  }

  var hatSel = document.getElementById('filterHat');
  hatSet.forEach(function(h) { var o = document.createElement('option'); o.value = h; o.textContent = h; hatSel.appendChild(o); });
  var enerjiSel = document.getElementById('filterEnerji');
  enerjiSet.forEach(function(e) { var o = document.createElement('option'); o.value = e; o.textContent = e; enerjiSel.appendChild(o); });

  var dates = rawData.map(function(r) { return r.tarih; }).sort();
  document.getElementById('lastUpdate').textContent = formatDate(dates[dates.length - 1]);

  document.getElementById('loadingOverlay').style.display = 'none';
  render();
}

function getFiltered() {
  var hat = document.getElementById('filterHat').value;
  var enerji = document.getElementById('filterEnerji').value;
  var tarih = document.getElementById('filterTarih').value;

  var data = rawData.slice();
  if (hat !== 'Tümü') data = data.filter(function(r) { return r.hat === hat; });
  if (enerji !== 'Tümü') data = data.filter(function(r) { return r.enerjiTipi === enerji; });
  if (tarih !== 'Tümü') {
    var allDates = [];
    data.forEach(function(r) { if (allDates.indexOf(r.tarih) === -1) allDates.push(r.tarih); });
    allDates.sort();
    var last = allDates.slice(-parseInt(tarih));
    data = data.filter(function(r) { return last.indexOf(r.tarih) >= 0; });
  }
  return data;
}

function render() {
  var data = getFiltered();
  renderKPI(data);
  renderTrend(data);
  renderPareto(data);
  renderTable(data);
}

function renderKPI(data) {
  var area = document.getElementById('kpiArea');
  if (data.length === 0) {
    area.innerHTML = '<div class="kpi" style="grid-column:1/-1;padding:30px"><div class="label">UYARI</div><div style="color:#999;font-size:13px">Secilen filtrelere ait veri bulunamadi.</div></div>';
    return;
  }

  var totalTuketim = 0, totalUretim = 0, totalHedef = 0, totalCO2 = 0;
  data.forEach(function(r) {
    totalTuketim += r.tuketim;
    totalUretim += r.uretim;
    totalHedef += r.hedef;
    totalCO2 += r.co2;
  });
  var avgBirimKwh = totalUretim > 0 ? totalTuketim / totalUretim : 0;
  var avgHedef = totalHedef / data.length;
  var avgSapma = avgHedef > 0 ? ((avgBirimKwh - avgHedef) / avgHedef) * 100 : 0;
  var uniqueDays = [];
  data.forEach(function(r) { if (uniqueDays.indexOf(r.tarih) === -1) uniqueDays.push(r.tarih); });

  var sapmaClass = avgSapma > 5 ? 'up' : avgSapma < -2 ? 'down' : 'neutral';
  var sapmaBadge = avgSapma > 5 ? 'badge-red' : avgSapma < -2 ? 'badge-green' : 'badge-blue';
  var sapmaLabel = avgSapma > 5 ? 'Hedef Ustu' : avgSapma < -2 ? 'Hedef Alti' : 'Hedefte';
  var sapmaArrow = avgSapma > 5 ? '▲' : avgSapma < -2 ? '▼' : '●';

  area.innerHTML =
    '<div class="kpi"><div class="icon">⚡</div><div class="label">TOPLAM TUKETIM</div><div class="value">' + formatTR(totalTuketim, 0) + ' kWh</div><div class="sub neutral">' + uniqueDays.length + ' gun</div></div>' +
    '<div class="kpi"><div class="icon">�icing</div><div class="label">TOPLAM URETIM</div><div class="value">' + formatTR(totalUretim, 0) + ' adet</div></div>' +
    '<div class="kpi"><div class="icon">📐</div><div class="label">BIRIM BASINA kWh</div><div class="value">' + formatTR(avgBirimKwh, 2) + '</div><div class="sub neutral">Ort. Hedef: ' + formatTR(avgHedef, 2) + '</div></div>' +
    '<div class="kpi"><div class="icon">' + sapmaArrow + '</div><div class="label">HEDEF SAPMA</div><div class="value ' + sapmaClass + '">' + (avgSapma >= 0 ? '+' : '') + formatTR(avgSapma, 1) + '%</div><div class="badge ' + sapmaBadge + '">' + sapmaLabel + '</div></div>' +
    '<div class="kpi"><div class="icon">🌿</div><div class="label">TOPLAM CO2</div><div class="value">' + formatTR(totalCO2 / 1000, 1) + ' ton</div><div class="sub neutral">' + formatTR(totalCO2 / totalUretim, 3) + ' kg/birim</div></div>';
}

function renderTrend(data) {
  var ctx = document.getElementById('trendChart');
  if (trendChart) trendChart.destroy();

  var dateSet = [], hatSet = [];
  data.forEach(function(r) {
    if (dateSet.indexOf(r.tarih) === -1) dateSet.push(r.tarih);
    if (hatSet.indexOf(r.hat) === -1) hatSet.push(r.hat);
  });
  dateSet.sort(); hatSet.sort();

  var colors = { 'Hat-1': '#1565c0', 'Hat-2': '#6a1b9a', 'Hat-3': '#00838f' };
  var datasets = hatSet.map(function(hat) {
    return {
      label: hat,
      data: dateSet.map(function(d) {
        var rows = data.filter(function(r) { return r.tarih === d && r.hat === hat; });
        if (rows.length === 0) return null;
        var t = 0; rows.forEach(function(r) { t += r.tuketim; });
        var u = rows[0].uretim;
        return u > 0 ? +(t / u).toFixed(3) : null;
      }),
      borderColor: colors[hat] || '#888',
      backgroundColor: 'transparent',
      borderWidth: 2,
      pointRadius: 1.5,
      tension: 0.3
    };
  });

  datasets.push({
    label: 'Hedef (ort.)',
    data: dateSet.map(function(d) {
      var rows = data.filter(function(r) { return r.tarih === d; });
      if (rows.length === 0) return null;
      var s = 0; rows.forEach(function(r) { s += r.hedef; });
      return s / rows.length;
    }),
    borderColor: '#bdbdbd',
    borderDash: [5, 3],
    backgroundColor: 'transparent',
    borderWidth: 1.5,
    pointRadius: 0
  });

  trendChart = new Chart(ctx, {
    type: 'line',
    data: { labels: dateSet.map(formatDate), datasets: datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 11 } } } },
      scales: {
        x: { ticks: { font: { size: 10 }, maxRotation: 45 } },
        y: { title: { display: true, text: 'kWh / Birim', font: { size: 11 } }, ticks: { font: { size: 10 } } }
      }
    }
  });
}

function renderPareto(data) {
  var ctx = document.getElementById('paretoChart');
  if (paretoChart) paretoChart.destroy();

  var hatSet = [], enerjiSet = [];
  data.forEach(function(r) {
    if (hatSet.indexOf(r.hat) === -1) hatSet.push(r.hat);
    if (enerjiSet.indexOf(r.enerjiTipi) === -1) enerjiSet.push(r.enerjiTipi);
  });
  hatSet.sort(); enerjiSet.sort();

  var bgColors = { 'Elektrik': '#1565c0', 'Dogalgaz': '#78909c', 'Doğalgaz': '#78909c' };
  var datasets = enerjiSet.map(function(tip) {
    return {
      label: tip,
      data: hatSet.map(function(hat) {
        var s = 0;
        data.forEach(function(r) { if (r.hat === hat && r.enerjiTipi === tip) s += r.tuketim; });
        return s;
      }),
      backgroundColor: bgColors[tip] || '#aaa',
      borderRadius: 4
    };
  });

  paretoChart = new Chart(ctx, {
    type: 'bar',
    data: { labels: hatSet, datasets: datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 11 } } } },
      scales: {
        x: { ticks: { font: { size: 11 } } },
        y: { title: { display: true, text: 'Toplam Tuketim (kWh)', font: { size: 11 } }, ticks: { font: { size: 10 }, callback: function(v) { return formatTR(v, 0); } } }
      }
    }
  });
}

function renderTable(data) {
  var body = document.getElementById('detailBody');
  if (data.length === 0) {
    body.innerHTML = '<tr><td colspan="10" style="text-align:center;padding:20px;color:#999">Secilen filtrelere ait veri bulunamadi.</td></tr>';
    return;
  }

  var sorted = data.slice().sort(function(a, b) { return b.hedefSapma - a.hedefSapma; });
  var html = '';
  sorted.forEach(function(r) {
    var dotClass = 'dot-green', statusText = 'Hedefte';
    if (r.hedefSapma > 10) { dotClass = 'dot-red'; statusText = 'Kritik'; }
    else if (r.hedefSapma > 5) { dotClass = 'dot-yellow'; statusText = 'Uyari'; }
    else if (r.hedefSapma < -5) { dotClass = 'dot-green'; statusText = 'Iyi'; }
    var sapClass = r.hedefSapma > 5 ? 'up' : r.hedefSapma < -2 ? 'down' : 'neutral';
    html += '<tr>' +
      '<td>' + formatDate(r.tarih) + '</td>' +
      '<td>' + r.hat + '</td>' +
      '<td>' + r.enerjiTipi + '</td>' +
      '<td style="text-align:right">' + formatTR(r.tuketim, 1) + '</td>' +
      '<td style="text-align:right">' + formatTR(r.uretim, 0) + '</td>' +
      '<td style="text-align:right">' + formatTR(r.birimKwh, 3) + '</td>' +
      '<td style="text-align:right">' + formatTR(r.hedef, 2) + '</td>' +
      '<td style="text-align:right;font-weight:600" class="' + sapClass + '">' + (r.hedefSapma >= 0 ? '+' : '') + formatTR(r.hedefSapma, 1) + '%</td>' +
      '<td style="text-align:right">' + formatTR(r.co2, 1) + '</td>' +
      '<td><span class="status-dot ' + dotClass + '"></span>' + statusText + '</td>' +
      '</tr>';
  });
  body.innerHTML = html;
}

document.getElementById('filterHat').addEventListener('change', render);
document.getElementById('filterEnerji').addEventListener('change', render);
document.getElementById('filterTarih').addEventListener('change', render);

fetchData().catch(function(err) {
  document.getElementById('loadingOverlay').innerHTML = '<div class="error-msg">Hata: ' + err.message + '</div><div class="state-msg" style="margin-top:8px">Lutfen internet baglantinizi kontrol edin ve sayfayi yenileyin.</div>';
});
</script>
</body>
</html>
